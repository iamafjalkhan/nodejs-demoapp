name: CI Build App

on:
  push:
    branches: [main]
  pull_request:

env:
  IMAGE_REG: ghcr.io
  IMAGE_REPO: benc-uk/nodejs-demoapp

# Prevent duplicate runs - cancel in-progress when new commits arrive
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  statuses: write
  checks: write

jobs:
  # Fast lint in parallel with tests
  lint:
    name: 'Linting'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: 'Checkout'
        uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: src/package-lock.json

      - name: 'Install dependencies'
        run: npm ci --prefix src

      - name: 'Run linting'
        run: make lint

  # Run tests in parallel with lint
  test:
    name: 'Tests'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: 'Checkout'
        uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: src/package-lock.json

      - name: 'Install dependencies'
        run: npm ci --prefix src

      - name: 'Run service'
        run: make run &

      - name: 'Run tests'
        run: |
          sleep 5
          make test-report

      - name: 'Test reporting'
        uses: phoenix-actions/test-reporting@v8
        id: test-report
        if: success() || failure()
        with:
          name: Integration Test Report
          path: test-results.xml
          reporter: java-junit
          fail-on-error: false

  # Build only runs after lint & test pass
  build:
    name: 'Build Docker image'
    needs: [lint, test]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: 'Checkout'
        uses: actions/checkout@v4

      - name: 'Docker build image'
        run: make image