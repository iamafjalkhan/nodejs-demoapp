name: CI Build App

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'package*.json'
      - 'Makefile'
      - 'build/**'
      - '.github/workflows/ci-build.yaml'
      - '.nvmrc'
      - '!.github/**'
      - '!.vscode/**'
      - '!*.md'
  pull_request:
    paths:
      - 'src/**'
      - 'package*.json'
      - 'Makefile'
      - 'build/**'
      - '.github/workflows/ci-build.yaml'
      - '.nvmrc'
      - '!.github/**'
      - '!.vscode/**'
      - '!*.md'

env:
  IMAGE_REG: ghcr.io
  IMAGE_REPO: benc-uk/nodejs-demoapp

# Prevent duplicate runs - cancel in-progress when new commits arrive
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read
  statuses: write
  checks: write

jobs:
  # Fast lint in parallel with tests
  lint:
    name: 'Linting'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: 'Checkout'
        uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: src/package-lock.json

      - name: 'Install dependencies'
        run: npm ci --prefix src

      - name: 'Run linting'
        run: make lint

  # Run tests in parallel with lint
  test:
    name: 'Tests'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: 'Checkout'
        uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: src/package-lock.json

      - name: 'Install dependencies'
        run: npm ci --prefix src

      - name: 'Run service'
        run: make run &

      - name: 'Run tests'
        run: |
          sleep 5
          make test-report

      - name: 'Test reporting'
        uses: phoenix-actions/test-reporting@v8
        id: test-report
        if: success() || failure()
        with:
          name: Integration Test Report
          path: test-results.xml
          reporter: java-junit
          fail-on-error: false

  # Build only runs after lint & test pass
  build:
    name: 'Build Docker image'
    needs: [lint, test]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: 'Checkout'
        uses: actions/checkout@v4

      - name: 'Set up Docker Buildx'
        uses: docker/setup-buildx-action@v3

      - name: 'Docker build with cache'
        run: |
          docker build \
            --build-arg BUILDKIT_INLINE_CACHE=1 \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            --tag nodejs-demoapp:build \
            -f build/Dockerfile .
